version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./model:/app/model          # Mount model directory (place mediscan_v5.pth here)
      - ./uploads:/app/uploads      # Persist uploaded X-ray images
      - ./mediscan.db:/app/mediscan.db  # Persist SQLite database (dev only)
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
